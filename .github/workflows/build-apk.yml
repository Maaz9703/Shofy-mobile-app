name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Node dependencies
        run: npm install

      - name: Prebuild Android (Expo Managed → Bare)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch Grade for Release Build (Debug Signing)
        run: |
          # Use Node to replace the signing config in the generated build.gradle
          node -e "
          const fs = require('fs');
          const path = 'android/app/build.gradle';
          let content = fs.readFileSync(path, 'utf8');
          // Replace signingConfig signingConfigs.release with signingConfig signingConfigs.debug
          content = content.replace(/signingConfig signingConfigs\.release/g, 'signingConfig signingConfigs.debug');
          fs.writeFileSync(path, content);
          console.log('Patched build.gradle to use debug signing for release build');
          "

      - name: Make Gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: ./android
        run: ./gradlew assembleRelease --no-daemon

      - name: Create / Update Release and Upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "Shofy App - Release Build"
          tag_name: latest
          make_latest: true
          files: android/app/build/outputs/apk/release/app-release.apk
          body: |
            🚀 Official Shofy mobile app Release build
            Optimized, clean, and professional.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
